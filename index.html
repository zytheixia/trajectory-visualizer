<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent 运行轨迹可视化工具</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div>
            <h1>Agent 运行轨迹</h1>
            <p>事件流、工具调用和错误路径分析</p>
          </div>
        </div>

        <section class="panel">
          <h2>数据</h2>
          <label class="upload-zone" for="fileInput">
            <input id="fileInput" type="file" accept=".json,.jsonl,application/json,application/x-ndjson" />
            <span>导入运行轨迹</span>
            <small>支持 JSON 数组、events/trace/steps 对象、JSONL</small>
          </label>
          <div class="button-row">
            <button id="loadSampleBtn" type="button">载入示例</button>
            <button id="clearBtn" type="button" class="secondary">清空</button>
          </div>
        </section>

        <section class="panel">
          <h2>视图</h2>
          <label class="control-line">
            <span>着色方式</span>
            <select id="colorMode">
              <option value="type">按类型</option>
              <option value="status">按状态</option>
              <option value="time">按时间</option>
            </select>
          </label>
          <label class="control-line">
            <span>节点标签</span>
            <input id="showLabels" type="checkbox" checked />
          </label>
          <label class="control-line">
            <span>网格</span>
            <input id="showGrid" type="checkbox" checked />
          </label>
        </section>

        <section class="panel stats-panel">
          <h2>统计</h2>
          <dl id="statsGrid" class="stats-grid">
            <div><dt>事件数</dt><dd>0</dd></div>
            <div><dt>工具调用</dt><dd>0</dd></div>
            <div><dt>失败</dt><dd>0</dd></div>
            <div><dt>总耗时</dt><dd>0 ms</dd></div>
          </dl>
        </section>

        <section class="panel">
          <h2>事件详情</h2>
          <div id="detailPanel" class="detail-panel">
            <p class="muted">选择一个节点查看事件详情。</p>
          </div>
        </section>

        <section class="panel">
          <h2>格式</h2>
          <pre class="format-note">[
  {"type":"user","name":"用户请求","content":"..."},
  {"type":"tool","name":"pytest","status":"failed"}
]</pre>
        </section>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <div>
            <strong id="trackName">Agent 调试示例</strong>
            <span id="trackMeta">等待加载运行数据</span>
          </div>
          <div class="legend" id="legend">
            <span class="legend-low">开始</span>
            <span class="legend-ramp"></span>
            <span class="legend-high">结束</span>
          </div>
        </header>

        <div class="canvas-wrap">
          <canvas id="trackCanvas"></canvas>
          <div id="emptyState" class="empty-state">
            <h2>导入 Agent 运行轨迹开始分析</h2>
            <p>支持 JSON / JSONL 事件流，按执行顺序展示思考、动作、工具和结果。</p>
          </div>
          <div id="tooltip" class="tooltip" hidden></div>
        </div>

        <footer class="timeline">
          <button id="playBtn" type="button" aria-label="播放">▶</button>
          <input id="timeSlider" type="range" min="0" max="100" value="100" />
          <output id="timeOutput">全部轨迹</output>
        </footer>
      </section>
    </main>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
